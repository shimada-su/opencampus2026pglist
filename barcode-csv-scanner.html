<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>バーコードスキャナー</title>
<script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#1a1a2e;
  --ink2:#16213e;
  --ink3:#0f3460;
  --hi:#e94560;
  --hi2:#f5a623;
  --scan:#00d4aa;
  --txt:#f0f0f8;
  --txt2:#a0a8c0;
  --txt3:#505878;
  --card:rgba(255,255,255,0.05);
  --card-border:rgba(255,255,255,0.08);
  --r:12px;
}

html,body{
  height:100%;
  background:var(--ink);
  color:var(--txt);
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  overscroll-behavior:none;
}

body{
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
}

/* ── TABS ── */
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  background:var(--ink2);
  border-bottom:1px solid var(--card-border);
  flex-shrink:0;
}

.tab{
  padding:14px 0;
  text-align:center;
  font-size:13px;
  font-weight:600;
  color:var(--txt3);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .2s, border-color .2s;
  letter-spacing:.3px;
  -webkit-tap-highlight-color:transparent;
}

.tab.active{color:var(--scan);border-bottom-color:var(--scan);}

/* ── PAGES ── */
.page{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:16px;gap:12px;}
.page.active{display:flex;}

/* ── CAMERA SECTION ── */
.cam-wrap{
  position:relative;
  border-radius:var(--r);
  overflow:hidden;
  background:#000;
  aspect-ratio:4/3;
  border:1px solid var(--card-border);
  flex-shrink:0;
}

#preview{width:100%;height:100%;object-fit:cover;display:block;}

.cam-idle{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--txt3);
}

.cam-idle svg{opacity:.4;}
.cam-idle p{font-size:13px;}

/* scan frame corners */
.sf{
  position:absolute;
  width:60%;height:35%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.sf::before,.sf::after,.sf span::before,.sf span::after{
  content:'';position:absolute;
  width:20px;height:20px;
  border:2.5px solid var(--scan);
}
.sf::before{top:0;left:0;border-right:0;border-bottom:0;border-radius:4px 0 0 0;}
.sf::after{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 4px 0 0;}
.sf span::before{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 4px;}
.sf span::after{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 4px 0;}

.scan-line{
  position:absolute;
  left:8%;right:8%;height:2px;
  background:linear-gradient(90deg,transparent,var(--scan),transparent);
  top:50%;opacity:0;
}
.scanning .scan-line{
  animation:sweep 1.8s ease-in-out infinite;opacity:1;
}
@keyframes sweep{0%,100%{top:12%}50%{top:88%}}

/* ── LAST RESULT BANNER ── */
.result-banner{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--r);
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  transition:background .3s, border-color .3s;
}
.result-banner.flash-ok{
  background:rgba(0,212,170,.12);
  border-color:rgba(0,212,170,.4);
}
.rb-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--txt3);flex-shrink:0;
  transition:background .3s;
}
.result-banner.flash-ok .rb-dot{background:var(--scan);}
.rb-text{flex:1;min-width:0;}
.rb-code{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:15px;font-weight:700;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rb-time{font-size:11px;color:var(--txt2);margin-top:2px;}
.rb-count{
  font-size:11px;color:var(--txt3);
  background:rgba(255,255,255,.06);
  border-radius:20px;padding:3px 8px;white-space:nowrap;
}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:8px;}

.btn{
  flex:1;padding:15px;
  border:none;border-radius:var(--r);
  font-size:15px;font-weight:700;
  cursor:pointer;
  transition:opacity .15s, transform .1s;
  -webkit-tap-highlight-color:transparent;
  letter-spacing:-.2px;
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}

.btn-primary{background:var(--scan);color:#012e27;}
.btn-stop{background:var(--card);color:var(--txt);border:1px solid var(--card-border);}
.btn-csv{background:var(--hi2);color:#1a0e00;}
.btn-danger{background:rgba(233,69,96,.12);color:var(--hi);border:1px solid rgba(233,69,96,.25);}

/* ── STATUS ── */
.status{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;color:var(--txt2);
  display:flex;align-items:center;gap:8px;min-height:40px;
}
.status.ok{color:var(--scan);border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.07);}
.status.err{color:var(--hi);border-color:rgba(233,69,96,.3);background:rgba(233,69,96,.07);}
.status.warn{color:var(--hi2);border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.07);}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ── LIST PAGE ── */
.list-toolbar{
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.count-badge{
  font-size:12px;font-weight:600;
  background:rgba(0,212,170,.12);color:var(--scan);
  border:1px solid rgba(0,212,170,.25);
  border-radius:20px;padding:3px 10px;white-space:nowrap;
}
.search-wrap{flex:1;position:relative;}
.search-input{
  width:100%;background:var(--card);border:1px solid var(--card-border);
  border-radius:8px;color:var(--txt);
  font-size:13px;padding:9px 12px 9px 32px;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:rgba(0,212,170,.4);}
.search-input::placeholder{color:var(--txt3);}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--txt3);pointer-events:none;
}

/* table */
.table-wrap{
  border-radius:var(--r);
  border:1px solid var(--card-border);
  overflow:hidden;
  flex:1;
}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl thead th{
  background:var(--ink2);
  padding:10px 12px;
  text-align:left;
  font-size:11px;font-weight:600;
  color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;
  border-bottom:1px solid var(--card-border);
  white-space:nowrap;
}
.tbl th:last-child,.tbl td:last-child{text-align:center;width:36px;}
.tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
.tbl tbody tr:last-child{border-bottom:none;}
.tbl tbody tr:hover{background:rgba(255,255,255,.03);}
.tbl td{padding:10px 12px;vertical-align:middle;}
.td-num{color:var(--txt3);font-size:11px;width:28px;text-align:right;}
.td-code{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:13px;font-weight:600;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.td-time{color:var(--txt2);font-size:11px;white-space:nowrap;}
.del-btn{
  background:none;border:none;color:var(--txt3);cursor:pointer;
  padding:4px;border-radius:4px;font-size:14px;line-height:1;
  transition:color .15s;-webkit-tap-highlight-color:transparent;
}
.del-btn:hover{color:var(--hi);}

.empty-tbl{
  text-align:center;padding:48px 20px;color:var(--txt3);
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.empty-tbl svg{opacity:.25;}
.empty-tbl p{font-size:13px;}

/* new row highlight */
@keyframes rowIn{from{background:rgba(0,212,170,.18);}to{background:transparent;}}
.row-new{animation:rowIn .8s ease-out;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1e2640;border:1px solid var(--scan);
  color:var(--scan);font-size:13px;font-weight:500;
  padding:10px 18px;border-radius:30px;
  opacity:0;transition:opacity .25s, transform .25s;
  pointer-events:none;white-space:nowrap;z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav class="tabs">
  <div class="tab active" onclick="showPage('scan')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:5px"><rect x="2" y="2" width="7" height="20" rx="1"/><rect x="12" y="2" width="3" height="20" rx="1"/><rect x="18" y="2" width="4" height="20" rx="1"/></svg>
    スキャン
  </div>
  <div class="tab" id="list-tab" onclick="showPage('list')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:5px"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
    一覧 <span id="tab-count" style="display:none;background:var(--hi);color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px;vertical-align:1px;font-weight:700;"></span>
  </div>
</nav>

<!-- ── SCAN PAGE ── -->
<div class="page active" id="page-scan">

  <div class="cam-wrap" id="cam-wrap">
    <div class="cam-idle" id="cam-idle">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>スキャン開始でカメラを起動</p>
    </div>
    <video id="preview" autoplay muted playsinline style="display:none;width:100%;height:100%;object-fit:cover;"></video>
    <div id="scan-overlay" style="display:none;position:absolute;inset:0;pointer-events:none;">
      <div class="sf"><span></span><div class="scan-line"></div></div>
    </div>
  </div>

  <div class="result-banner" id="result-banner">
    <div class="rb-dot"></div>
    <div class="rb-text">
      <div class="rb-code" id="rb-code">待機中</div>
      <div class="rb-time" id="rb-time">バーコードをカメラに向けてください</div>
    </div>
    <div class="rb-count" id="rb-count">0 件</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="scan-btn" onclick="toggleScan()">スキャン開始</button>
  </div>

  <div class="status" id="status">
    <div class="status-dot"></div>
    <span id="status-txt">準備完了 — スキャン開始ボタンを押してください</span>
  </div>

</div>

<!-- ── LIST PAGE ── -->
<div class="page" id="page-list">

  <div class="list-toolbar">
    <span class="count-badge" id="count-badge">0 件</span>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-input" type="search" placeholder="バーコードを検索…" oninput="renderTable()">
    </div>
  </div>

  <div class="table-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th class="td-num">#</th>
          <th>バーコード</th>
          <th>日時</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
    <div class="empty-tbl" id="empty-tbl">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="7" height="20" rx="1"/><rect x="12" y="2" width="3" height="20" rx="1"/><rect x="18" y="2" width="4" height="20" rx="1"/></svg>
      <p>まだ読み取りデータがありません</p>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-csv" id="csv-btn" onclick="downloadCSV()" disabled>
      ↓ CSVダウンロード
    </button>
    <button class="btn btn-danger" id="clear-btn" onclick="clearAll()" disabled>
      全削除
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let records = [];    // {id, code, datetime, ms}
let scanning = false;
let codeReader = null;
let lastCode = '';
let lastCodeMs = 0;
let newRowId = null;

// ── NAVIGATION ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const idx = name === 'scan' ? 0 : 1;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if (name === 'list') renderTable();
}

// ── STATUS ──
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.className = 'status' + (type ? ' ' + type : '');
  document.getElementById('status-txt').textContent = msg;
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SCAN ──
async function toggleScan() {
  scanning ? stopScan() : startScan();
}

async function startScan() {
  if (typeof ZXing === 'undefined') {
    setStatus('ライブラリ読み込みエラー。ページを再読み込みしてください', 'err'); return;
  }
  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
    if (!devices.length) throw new Error('カメラが見つかりません');
    const back = devices.find(d => /back|rear|environment/i.test(d.label));
    const deviceId = (back || devices[devices.length - 1]).deviceId;

    const preview = document.getElementById('preview');
    preview.style.display = 'block';
    document.getElementById('cam-idle').style.display = 'none';
    const overlay = document.getElementById('scan-overlay');
    overlay.style.display = 'block';
    overlay.querySelector('.sf').classList.add('scanning');

    scanning = true;
    const btn = document.getElementById('scan-btn');
    btn.textContent = 'スキャン停止';
    btn.className = 'btn btn-stop';
    setStatus('カメラ起動中… バーコードを枠に合わせてください', '');

    await codeReader.decodeFromVideoDevice(deviceId, preview, (result, err) => {
      if (!result) return;
      const code = result.getText();
      const now = Date.now();
      if (code === lastCode && now - lastCodeMs < 1500) return;
      lastCode = code;
      lastCodeMs = now;
      addRecord(code);
    });
  } catch(e) {
    setStatus('カメラ起動失敗: ' + e.message, 'err');
    stopScan();
  }
}

function stopScan() {
  if (codeReader) { codeReader.reset(); codeReader = null; }
  scanning = false;
  const preview = document.getElementById('preview');
  preview.style.display = 'none';
  document.getElementById('cam-idle').style.display = 'flex';
  const overlay = document.getElementById('scan-overlay');
  overlay.style.display = 'none';
  overlay.querySelector('.sf').classList.remove('scanning');
  const btn = document.getElementById('scan-btn');
  btn.textContent = 'スキャン開始';
  btn.className = 'btn btn-primary';
  setStatus('スキャンを停止しました', '');
}

// ── ADD RECORD ──
function addRecord(code) {
  const now = new Date();
  const datetime = now.toLocaleString('ja-JP', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
  const rec = { id: now.getTime() + Math.random(), code, datetime, ms: now.getTime() };
  records.unshift(rec);
  newRowId = rec.id;

  // update banner
  const banner = document.getElementById('result-banner');
  document.getElementById('rb-code').textContent = code;
  document.getElementById('rb-time').textContent = datetime;
  document.getElementById('rb-count').textContent = records.length + ' 件';
  banner.classList.remove('flash-ok');
  void banner.offsetWidth;
  banner.classList.add('flash-ok');
  setTimeout(() => banner.classList.remove('flash-ok'), 600);

  // update tab badge
  updateTabCount();
  setStatus('読み取り完了: ' + code, 'ok');
}

function updateTabCount() {
  const n = records.length;
  const badge = document.getElementById('tab-count');
  badge.textContent = n;
  badge.style.display = n > 0 ? 'inline' : 'none';
  document.getElementById('count-badge').textContent = n + ' 件';
  document.getElementById('csv-btn').disabled = n === 0;
  document.getElementById('clear-btn').disabled = n === 0;
}

// ── TABLE ──
function renderTable() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const filtered = q ? records.filter(r => r.code.toLowerCase().includes(q)) : records;

  const tbody = document.getElementById('tbl-body');
  const empty = document.getElementById('empty-tbl');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'flex';
    empty.querySelector('p').textContent = q ? `「${q}」に一致するデータがありません` : 'まだ読み取りデータがありません';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map((r, i) => `
    <tr class="${r.id === newRowId ? 'row-new' : ''}" id="row-${r.id}">
      <td class="td-num">${filtered.length - i}</td>
      <td class="td-code" title="${esc(r.code)}">${esc(r.code)}</td>
      <td class="td-time">${r.datetime}</td>
      <td><button class="del-btn" onclick="deleteRecord(${r.id})" title="削除">✕</button></td>
    </tr>
  `).join('');
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  updateTabCount();
  renderTable();
}

function clearAll() {
  if (!confirm('すべてのデータを削除しますか？')) return;
  records = [];
  lastCode = '';
  document.getElementById('rb-code').textContent = '待機中';
  document.getElementById('rb-time').textContent = 'バーコードをカメラに向けてください';
  document.getElementById('rb-count').textContent = '0 件';
  updateTabCount();
  renderTable();
}

// ── CSV ──
function downloadCSV() {
  if (!records.length) return;
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const target = q ? records.filter(r => r.code.toLowerCase().includes(q)) : records;

  const header = 'バーコード,日時\n';
  const rows = [...target].reverse().map(r => `"${r.code.replace(/"/g,'""')}","${r.datetime}"`).join('\n');
  const csv = '\uFEFF' + header + rows; // BOM for Excel

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `barcode_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSVをダウンロードしました（' + target.length + '件）');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// init
updateTabCount();
renderTable();
</script>
</body>
</html>
